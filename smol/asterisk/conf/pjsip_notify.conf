; rfc3842
; put empty "Content=>" at the end to have CRLF after last body line

[clear-mwi]
Event=>message-summary
Content-type=>application/simple-message-summary
Content=>Messages-Waiting: no
Content=>Message-Account: sip:asterisk@127.0.0.1
Content=>Voice-Message: 0/0 (0/0)
Content=>

; Aastra

[aastra-check-cfg]
Event=>check-sync

[aastra-xml]
Event=>aastra-xml

; Digium

[digium-check-cfg]
Event=>check-sync

; Linksys

[linksys-cold-restart]
Event=>reboot_now

[linksys-warm-restart]
Event=>restart_now

; Polycom

[polycom-check-cfg]
Event=>check-sync

; Sipura

[sipura-check-cfg]
Event=>resync

[sipura-get-report]
Event=>report

; snom

[snom-check-cfg]
Event=>check-sync\;reboot=false

[snom-reboot]
Event=>check-sync\;reboot=true

; Cisco

[cisco-check-cfg]
Event=>check-sync

; custom examples to use for PJSIPNotify application

; tell an endpoint to check messages
[custom-notify-1]
Event=>custom
Content-type=>application/voicemail
Content=>check-messages
Content=>

; tell an endpoint to force a remote hangup via custom header
[custom-notify-2]
Event=>custom
X-Data=>force-hangup

[cisco-restart]
Event => service-control
Subscription-State => active
Content-Type => text/plain
Content => action=restart
Content => RegisterCallId={${SIPPEER(${PEERNAME},regcallid)}}

[cisco-reset]
Event => service-control
Subscription-State => active
Content-Type => text/plain
Content => action=reset
Content => RegisterCallId={${SIPPEER(${PEERNAME},regcallid)}}


[cisco-restart]
; Event => service-control
Subscription-State => active
Content-Type => text/plain
Content => action=restart
Content => RegisterCallId={${PJSIP(${PEERNAME},regcallid)}}
Content => ConfigVersionStamp={00000000-0000-0000-0000-000000000000}
Content => DialplanVersionStamp={00000000-0000-0000-0000-000000000000}
Content => SoftkeyVersionStamp={00000000-0000-0000-0000-000000000000}
Content => FeatureControlVersionStamp={00000000-0000-0000-0000-000000000000}
Content => HeadsetVersionStamp={0-0000000000}
services:
  asterisk:
    build: asterisk
    restart: always
    network_mode: host
    env_file: .env
    volumes:
      # Share system timezone
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    logging:
      driver: "local"
      options:
        max-size: "8m"
        max-file: "4"
    deploy:
      resources:
        limits:
          cpus: 2
          memory: 256M

  caddy:
    image: caddy:latest
    restart: always
    network_mode: host
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./tftpboot:/tftpboot:ro
    logging:
      driver: "local"
      options:
        max-size: "8m"
        max-file: "4"
    deploy:
      resources:
        limits:
          cpus: 1
          memory: 128M